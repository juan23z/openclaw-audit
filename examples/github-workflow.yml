# Copy this into your repo as .github/workflows/security.yml
name: security-scan
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  openclaw-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Dogfood: run this repo's own action on the bundled contracts.
      - uses: ./
        with:
          path: contracts
          name: OpenClaw Audit (self-scan)